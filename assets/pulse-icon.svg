<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <style>
    .ring { transform-origin: 32px 32px; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.12); opacity: 0.75; }
    }
  </style>
  <circle class="ring" cx="32" cy="32" r="22" fill="none" stroke="#C41E3A" stroke-width="3"/>
  <circle cx="32" cy="32" r="10" fill="#C41E3A">
    <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="32" cy="32" r="28" fill="none" stroke="#E85D04" stroke-opacity="0.35" stroke-width="1.5">
    <animate attributeName="r" values="26;30;26" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.45;0.15;0.45" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
